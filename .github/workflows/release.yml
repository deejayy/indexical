name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Validate version against package.json
        run: |
          pkg_version=$(node -p "require('./server/package.json').version")
          if [ "$pkg_version" != "$VERSION" ]; then
            echo "Tag v$VERSION does not match server/package.json version $pkg_version" >&2
            exit 1
          fi

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v$VERSION" --draft --verify-tag --title "v$VERSION"

    outputs:
      version: ${{ env.VERSION }}

  build-extension:
    name: build-extension
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build extension archives
        run: |
          version="${{ needs.create-release.outputs.version }}"
          cd extension/src
          zip -r "../../indexical-firefox-v${version}.xpi" . ../assets/
          cp "../../indexical-firefox-v${version}.xpi" "../../indexical-chromium-v${version}.zip"

      - name: Generate checksums
        run: |
          version="${{ needs.create-release.outputs.version }}"
          shasum -a 256 "indexical-firefox-v${version}.xpi" > "indexical-firefox-v${version}.xpi.sha256"
          shasum -a 256 "indexical-chromium-v${version}.zip" > "indexical-chromium-v${version}.zip.sha256"

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.create-release.outputs.version }}"
          gh release upload "v${version}" \
            "indexical-firefox-v${version}.xpi" \
            "indexical-firefox-v${version}.xpi.sha256" \
            "indexical-chromium-v${version}.zip" \
            "indexical-chromium-v${version}.zip.sha256"

  build-release:
    name: build-${{ matrix.build }}
    needs: [create-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: windows-x64
            os: windows-latest
            platform: win32
            arch: x64
            ext: .exe
            archive: zip

          - build: linux-x64
            os: ubuntu-22.04
            platform: linux
            arch: x64
            ext: ""
            archive: tar.gz

          - build: macos-arm64
            os: macos-latest
            platform: darwin
            arch: arm64
            ext: ""
            archive: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Build SEA executable
        working-directory: server
        run: node scripts/build-sea.js

      - name: Determine archive name
        shell: bash
        run: |
          version="${{ needs.create-release.outputs.version }}"
          echo "ARCHIVE=indexical-$version-${{ matrix.build }}" >> $GITHUB_ENV

      - name: Create archive directory
        shell: bash
        run: |
          mkdir -p "$ARCHIVE"
          cp "dist/indexical-server${{ matrix.ext }}" "$ARCHIVE/"
          cp README.md "$ARCHIVE/"

      - name: Build archive (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          7z a "$ARCHIVE.zip" "$ARCHIVE"
          certutil -hashfile "$ARCHIVE.zip" SHA256 > "$ARCHIVE.zip.sha256"
          echo "ASSET=$ARCHIVE.zip" >> $GITHUB_ENV
          echo "ASSET_SUM=$ARCHIVE.zip.sha256" >> $GITHUB_ENV

      - name: Build archive (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"
          shasum -a 256 "$ARCHIVE.tar.gz" > "$ARCHIVE.tar.gz.sha256"
          echo "ASSET=$ARCHIVE.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SUM=$ARCHIVE.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version="${{ needs.create-release.outputs.version }}"
          gh release upload "v$version" "$ASSET" "$ASSET_SUM"
