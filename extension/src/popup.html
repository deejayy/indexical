<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Indexical Search</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Popup-specific styles */
      html, body {
        width: 360px;
        max-height: 520px;
        margin: 0;
        overflow: hidden;
      }

      body {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
        padding: var(--spacing-sm);
      }

      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-row h3 {
        font-size: var(--font-size-lg);
        margin: 0;
      }

      .button-row {
        display: flex;
        gap: var(--spacing-sm);
      }

      .button-row button {
        flex: 1;
      }

      #searchBtn {
        background: var(--color-primary);
        color: white;
        border-color: var(--color-primary);
      }

      #searchBtn:hover {
        background: var(--color-primary-hover);
        border-color: var(--color-primary-hover);
      }

      #settingsBtn {
        padding: var(--spacing-xs) var(--spacing-sm);
        font-size: var(--font-size-xs);
      }

      #daemon-status {
        display: none;
        align-items: flex-start;
        gap: var(--spacing-sm);
        padding: var(--spacing-sm);
        border-radius: var(--radius-sm);
        background: var(--color-error-bg);
        border: 1px solid var(--color-error-border);
        color: var(--color-error-text);
        font-size: var(--font-size-sm);
        line-height: 1.4;
      }

      #daemon-status .badge-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: var(--radius-sm);
        background: #DC3545;
        color: #fff;
        font-weight: 700;
        font-size: 12px;
        flex-shrink: 0;
        margin-top: 1px;
      }

      #results {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
      }

      #results .result {
        padding: var(--spacing-sm);
        margin: 0;
      }

      #results .result .title {
        font-size: var(--font-size-sm);
        margin-bottom: 2px;
      }

      #results .result .url {
        font-size: var(--font-size-xs);
        margin-bottom: 2px;
      }

      #results .result .meta {
        margin-bottom: 2px;
      }

      #results .result .snippet {
        font-size: var(--font-size-xs);
        line-height: 1.4;
      }

      #results .result .excerpt {
        font-size: var(--font-size-xs);
        padding: var(--spacing-xs);
        margin-bottom: 0;
        line-height: 1.4;
      }

      #results .no-results,
      #results .loading {
        padding: var(--spacing-md);
      }
    </style>
  </head>
  <body>
    <div class="header-row">
      <h3><img src="favicon.svg" alt="" style="height: 1.5rem; vertical-align: middle;"> Indexical</h3>
      <button id="settingsBtn" title="Open Settings">⚙️ Settings</button>
    </div>
    <div id="daemon-status">
      <span class="badge-icon">!</span>
      <span><strong>Daemon not responding.</strong> The <strong style="color:#DC3545">!</strong> badge on the toolbar icon means the daemon is unreachable. Check that it is running, or verify the URL in Settings.</span>
    </div>
    <input id="query" type="text" placeholder="Search your memory..." />
    <div class="button-row">
      <button id="searchBtn">Search Here</button>
      <button id="openTabBtn">Open in Tab</button>
    </div>
    <div id="results"></div>

    <script src="logger.js"></script>
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
